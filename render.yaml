services:
  # Backend API Service
  - type: web
    name: vinschool-ai-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinschool-db
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: vinschool-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: vinschool-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: vinschool-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: vinschool-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: vinschool-db
          property: password
      - key: MILVUS_HOST
        sync: false
      - key: MILVUS_PORT
        value: "19530"
      - key: MILVUS_URI
        sync: false
      - key: MILVUS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_ENV
        value: production

  # Frontend Next.js Service
  - type: web
    name: vinschool-ai-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: starter
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: vinschool-ai-backend
          type: web
          property: host

# Managed PostgreSQL Database
databases:
  - name: vinschool-db
    plan: free
    databaseName: vinschool_ai
    user: vinschool
