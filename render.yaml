services:
  # Backend API Service
  - type: web
    name: vinschool-ai-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinschool-db
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: vinschool-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: vinschool-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: vinschool-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: vinschool-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: vinschool-db
          property: password
      - key: MILVUS_HOST
        sync: false
      - key: MILVUS_PORT
        value: "19530"
      - key: MILVUS_URI
        sync: false
      - key: MILVUS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      # Notifications - Email/Gmail
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: "true"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: TEACHER_EMAIL
        sync: false
      # Notifications - Google Chat Webhook
      - key: ENABLE_GOOGLE_CHAT_NOTIFICATIONS
        value: "true"
      - key: GOOGLE_CHAT_WEBHOOK_URL
        sync: false
      # Notifications - Google Chat Bot (Pub/Sub)
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GOOGLE_CHAT_PUBSUB_SUBSCRIPTION
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: "/etc/secrets/google-credentials.json"
      - key: GOOGLE_CHAT_SPACE_ID
        sync: false

  # Frontend Next.js Service
  - type: web
    name: vinschool-ai-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: starter
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: vinschool-ai-backend
          type: web
          property: host

# Managed PostgreSQL Database
databases:
  - name: vinschool-db
    plan: free
    databaseName: vinschool_ai
    user: vinschool
